<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>500 Error</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.10/lottie.min.js"></script>
	<meta http-equiv="refresh" content="5">
	<meta charset="UTF-8">
	<style>
      .shimmer {
          background: linear-gradient(90deg, #9a9b9e 25%, #2a2929 50%, #9a9b9e 75%);
          background-size: 200% 100%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: shimmer 8s linear infinite;
          color: #818286; /* Fallback color */
      }

      @keyframes shimmer {
          0% {
              background-position: 200% 0;
          }
          100% {
              background-position: -200% 0;
          }
      }

      .dark {
          background: #000;
      }
	</style>
</head>
<body>
<div class="h-[100vh] flex">
	<div
		class="flex-grow text-center flex justify-center flex-col space-y-2 mx-4 mb-12"
	>
		<a href="/">
			<div
				id="lottie-animation"
				class="h-[5rem] w-auto mx-auto"
				alt=""
			></div>
		</a>
		<div>


			<div id="errorInfoDiv" class="text-medium text-gray-500 flex flex-col shimmer">

			</div>
		</div>
	</div>
</div>
<script>
	const language = localStorage.getItem('locale') || 'de-DE';

	document.getElementById('errorInfoDiv').innerText =
		language == 'de-DE' ? 'Wir führen gerade ein kurzes Update durch. In wenigen Augenblicken sind wir wieder da.' :
			`We are performing a short update. We'll be back in a moment.`;
	window.addEventListener('DOMContentLoaded', () => {
		const isDarkLS = localStorage.getItem('theme') === 'dark';
		const isDark = localStorage.getItem('theme') === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches;
		if (isDarkLS || isDark) {
			document.documentElement.classList.add('dark');
		}

		const animationPath = isDarkLS || isDark ? '/b-logo-white.json' : '/b-logo-black.json';
		const container = document.getElementById('lottie-animation');
		const animation = lottie.loadAnimation({
			container: container,
			renderer: 'svg',
			loop: true,
			autoplay: true,
			path: animationPath
		});
	});
</script>
</body>
</html>
