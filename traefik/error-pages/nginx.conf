server {
  listen 80;
  server_name _;

  error_page  404    /404.html;
  error_page  500    /500.html;

    location / {
        root  /usr/share/nginx/html;
	index /404.html;
    }

    location ~ \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}