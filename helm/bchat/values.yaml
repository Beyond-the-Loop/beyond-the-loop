# Default values for bchat. Overridden by values.<env>.yaml.

# Environment name — drives secret prefix in GCP Secret Manager and resource naming.
environment: staging

# GCP project
gcp:
  projectId: beyond-chat-1111
  projectNumber: ""  # filled in via --set during deploy
  region: europe-west3

# Domain configuration
domains:
  app: ""           # e.g. chat.beyondtheloop.ai
  mcp: ""           # e.g. mcp-m365.beyondtheloop.ai
  redirectFrom: ""  # e.g. v2.beyondtheloop.ai
  # When provisioning Gateway/Cert from scratch, a temporary subdomain can be used for cert validation
  # before flipping the production DNS. Set to non-empty to use it as the cert SAN instead of `app`.
  certHostnameOverride: ""

# Image
image:
  repository: europe-west3-docker.pkg.dev/beyond-chat-1111/bchat/app
  tag: "latest"
  pullPolicy: IfNotPresent

litellmImage:
  repository: ghcr.io/berriai/litellm
  tag: "v1.81.14-stable.gpt-5.4-patch7"
  pullPolicy: IfNotPresent

mcpImage:
  repository: europe-west3-docker.pkg.dev/beyond-chat-1111/bchat/ms365-mcp
  tag: "latest"
  pullPolicy: IfNotPresent

# Workload Identity — GCP service account that pods impersonate.
# Created in the bootstrap script.
serviceAccount:
  gcpServiceAccount: ""  # e.g. bchat-app-staging@beyond-chat-1111.iam.gserviceaccount.com

# App deployment
app:
  strategy:
    type: RollingUpdate
    # 1 → 25%: at HPA=9 the previous surge of 1 forced a sequential 1-by-1
    # replacement (~5min startupProbe × 9 pods = ~45min rollout) while old
    # pods were terminated with a too-short grace and preStop, producing
    # exit-137 cascades in prod on 2026-07-08. 25% lets 2–3 replacements
    # proceed in parallel and keeps the rollout inside minutes.
    maxSurge: 25%
    maxUnavailable: 0
  replicas: 2
  resources:
    # Raised requests.memory 2Gi → 3Gi on 2026-07-09 after a live cluster
    # check found a pod evicted with RSS = 3.04 GB (request 2Gi, limit 4Gi):
    #   "The node was low on resource: memory. Threshold: 100Mi,
    #    available: 66056Ki. Container app was using 3188356Ki,
    #    request is 2Gi, has larger consumption of memory."
    # Container was under its 4Gi limit, but exceeding request lets Autopilot
    # overpack the node → kubelet evicts on node-level pressure. Requests
    # must reflect real p95 RSS or evictions keep happening. Limit bumped
    # 4Gi → 5Gi for headroom on model-cache growth.
    requests:
      cpu: 500m
      memory: 3Gi
    limits:
      cpu: 2
      memory: 5Gi
  # 60 → 180: chat streams routinely run 30–120s and the LB draining
  # window is 120s. Grace must exceed preStopDelaySeconds + typical
  # in-flight stream length, otherwise SIGKILL cuts streams (exit 137).
  terminationGracePeriodSeconds: 180
  # Sleep before uvicorn stops accepting connections, so the k8s Service
  # endpoints controller can remove the pod from rotation and the GCE LB
  # can finish its drainingTimeoutSec (120s) drain before the process exits.
  # Same drain pattern as litellm/mcp — was missing on app.
  preStopDelaySeconds: 120
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
    # HPA scale-down held for this long after CPU drops. Without this,
    # HPA was collapsing 9 → 2 replicas in seconds, SIGTERM'ing pods with
    # open streams. Longer window prevents thrashing during traffic dips.
    scaleDownStabilizationSeconds: 600
  pdb:
    enabled: true
    # 1 → 50%: with HPA scaling to 10 replicas, minAvailable:1 allowed 9
    # voluntary evictions at once. Percentage scales with replica count.
    minAvailable: 50%
  backendConfig:
    # Raises the GCE load balancer -> backend response timeout from the
    # 30s default. Chat streams routinely exceed 30s; the old value caused
    # 502s on legitimate long completions.
    timeoutSec: 300
    # During rolling updates, let the LB keep sending traffic to a
    # terminating pod for this long so in-flight streams can finish.
    # Bumped 60 → 120 after seeing >5000 LB-side 502s on WebSocket routes
    # during pod churn.
    drainingTimeoutSec: 120

# LiteLLM deployment
litellm:
  replicas: 2
  resources:
    # LiteLLM v1.81 with 40+ models and enterprise callbacks (prometheus,
    # semantic filter, cost tracking) burns CPU under streaming load. Prod
    # 24h stress on the old 500m/1c limits produced 132 `context deadline
    # exceeded` liveness failures and 198 pod restarts. Sized for the
    # observed steady-state (2600+ completions/day) with headroom for spikes.
    requests:
      cpu: 1500m
      memory: 1500Mi
    limits:
      cpu: 4
      memory: 3Gi
  # Grace period for uvicorn to finish in-flight streams. Combined with the
  # preStop delay, gives about 70s of drain time before SIGKILL.
  terminationGracePeriodSeconds: 90
  # Sleep before uvicorn stops accepting connections, so the k8s Service
  # endpoints controller can remove this pod from rotation first.
  preStopDelaySeconds: 20
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 60
    # HPA scale-down held for this long after CPU falls below target. Longer
    # window prevents thrashing when a spiky workload briefly cools off, and
    # keeps pods around long enough for streaming responses to finish.
    scaleDownStabilizationSeconds: 600
  pdb:
    enabled: true
    minAvailable: 1

# Microsoft 365 MCP server
mcp:
  replicas: 2
  publicUrl: ""  # e.g. https://mcp-m365-staging.beyondtheloop.ai
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Grace period for open MCP HTTP/SSE sessions to drain instead of being
  # cut mid-transaction. Prod saw 114 mcp pods in 24h without any drain.
  terminationGracePeriodSeconds: 60
  preStopDelaySeconds: 15
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
  pdb:
    enabled: true
    minAvailable: 1

# External Secrets Operator — pulls all secrets matching this regex from GCP Secret Manager
# and rewrites the names by stripping the prefix.
externalSecrets:
  # Secrets in GCP follow the naming: bchat-<environment>-<KEY>
  # ESO reads them and exposes them as env vars without the prefix.
  refreshInterval: 10m

# Gateway / TLS
gateway:
  enabled: true
  # When false, only HTTPRoutes are created (useful if Gateway is managed separately).
  # Static IP must be reserved beforehand and its name supplied here.
  staticIpName: ""  # e.g. bchat-staging-ingress-ip
  managedCertSecondaryNames: []  # extra SANs for the managed cert

# DB migration Job — runs `alembic upgrade head` as a pre-upgrade Helm hook
# using the new release's image. Helm blocks the release on failure so old
# pods keep serving traffic.
migrationJob:
  enabled: true
  activeDeadlineSeconds: 900  # 15 min — headroom for large migrations
  # resources are optional; defaults inside the template are conservative

# Scheduled jobs. Each entry becomes a K8s CronJob that POSTs to an internal
# endpoint on the app pod. Schedules are interpreted in the timezone below
# (matches the times the old in-process APScheduler used before we moved cron
# out of the request-serving pod).
cronjobs:
  chatArchival:
    enabled: true
    name: chat-archival
    schedule: "0 23 * * *"  # 23:00 Europe/Berlin daily
    timeZone: "Europe/Berlin"
    path: "/internal/cron/chat-archival"
    activeDeadlineSeconds: 3600
    curlMaxTime: 3600
  fileCleanup:
    enabled: true
    name: file-cleanup
    schedule: "30 23 * * *"  # 23:30 Europe/Berlin daily
    timeZone: "Europe/Berlin"
    path: "/internal/cron/file-cleanup"
    activeDeadlineSeconds: 3600
    curlMaxTime: 3600
  companiesAdoptionRate:
    enabled: true
    name: companies-adoption-rate
    schedule: "0 1 * * *"  # 01:00 Europe/Berlin daily
    timeZone: "Europe/Berlin"
    path: "/internal/cron/companies-adoption-rate"
    activeDeadlineSeconds: 1800
    curlMaxTime: 1800
  creditRechargeCheck:
    enabled: true
    name: credit-recharge-check
    schedule: "0 1 * * *"  # 01:00 Europe/Berlin daily
    timeZone: "Europe/Berlin"
    path: "/internal/cron/credit-recharge-check"
    activeDeadlineSeconds: 1800
    curlMaxTime: 1800
  companyCreditConsumption:
    enabled: true
    name: company-credit-consumption
    schedule: "30 1 * * *"  # 01:30 Europe/Berlin daily
    timeZone: "Europe/Berlin"
    path: "/internal/cron/company-credit-consumption"
    activeDeadlineSeconds: 1800
    curlMaxTime: 1800
  userCreditConsumption:
    enabled: true
    name: user-credit-consumption
    schedule: "0 2 * * *"  # 02:00 Europe/Berlin daily
    timeZone: "Europe/Berlin"
    path: "/internal/cron/user-credit-consumption"
    activeDeadlineSeconds: 3600
    curlMaxTime: 3600

# Litellm config — full YAML inlined. Override via --set-file in CI.
litellmConfig: ""

# Arena rankings — inlined. Override via --set-file in CI.
arenaRankings: ""

# Observability configuration (GKE Managed Prometheus, etc.)
observability:
  podMonitoring:
    enabled: false
    interval: 30s
