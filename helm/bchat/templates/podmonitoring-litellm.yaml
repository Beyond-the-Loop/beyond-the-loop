{{- if .Values.observability.podMonitoring.enabled }}
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: bchat-litellm
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  selector:
    matchLabels:
      {{- include "bchat.litellmSelector" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.observability.podMonitoring.interval | default "30s" }}
{{- end }}
