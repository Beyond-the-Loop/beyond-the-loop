apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  {{- if not .Values.app.hpa.enabled }}
  replicas: {{ .Values.app.replicas }}
  {{- end }}
  strategy:
    type: {{ .Values.app.strategy.type }}
    {{- if eq .Values.app.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.app.strategy.maxUnavailable }}
      maxSurge: {{ .Values.app.strategy.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "bchat.appSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bchat.appSelector" . | nindent 8 }}
      annotations:
        # Forces pod restart on ConfigMap/Secret content change
        checksum/litellm-config: {{ .Values.litellmConfig | sha256sum }}
        checksum/arena-rankings: {{ .Values.arenaRankings | sha256sum }}
        # Prevent Cluster Autoscaler from evicting app pods for node
        # scale-down while they hold long-lived streaming connections
        # (chat completions, SSE, WebSockets). Voluntary evictions still
        # go through the PDB. Same pattern as litellm/mcp — was missing
        # on app and contributed to the 2026-07-08 prod incident.
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      serviceAccountName: {{ include "bchat.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.app.terminationGracePeriodSeconds }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            # Prometheus scrape port. Deliberately not routed via any
            # Service — GMP scrapes the pod IP directly, so this port is
            # unreachable from outside the cluster network.
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "bchat.appConfigName" . }}
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            # Migrations are run by the pre-upgrade Helm hook Job, never by
            # app pods (otherwise every replica would race the Job on boot).
            - name: ENABLE_DB_MIGRATIONS
              value: "false"
          volumeMounts:
            - name: arena
              mountPath: /app/arena_rankings.json
              subPath: arena_rankings.json
              readOnly: true
            - name: litellm-config-shared
              mountPath: /app/litellm-config.yaml
              subPath: config.yaml
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            # 3s → 5s: live cluster on 2026-07-09 showed multiple
            # "context deadline exceeded" readiness failures on healthy
            # pods (event loop busy under streaming load). Same reason
            # litellm bumped to 5s.
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            # 3s → 5s and failureThreshold 5 → 6 for the same reason:
            # spurious liveness kills restart pods with open streams,
            # producing exit-137 cascades.
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          # preStop sleeps so the k8s Service endpoints controller and the
          # GCE LB (drainingTimeoutSec) have time to remove this pod from
          # rotation before uvicorn stops accepting new connections. Existing
          # streams then get the full terminationGracePeriodSeconds to drain.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep {{ .Values.app.preStopDelaySeconds }}"
      volumes:
        - name: arena
          configMap:
            name: arena-rankings
        - name: litellm-config-shared
          configMap:
            name: litellm-config
