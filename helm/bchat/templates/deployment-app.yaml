apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  {{- if not .Values.app.hpa.enabled }}
  replicas: {{ .Values.app.replicas }}
  {{- end }}
  strategy:
    type: {{ .Values.app.strategy.type }}
    {{- if eq .Values.app.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    {{- end }}
  selector:
    matchLabels:
      {{- include "bchat.appSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bchat.appSelector" . | nindent 8 }}
      annotations:
        # Forces pod restart on ConfigMap/Secret content change
        checksum/litellm-config: {{ .Values.litellmConfig | sha256sum }}
        checksum/arena-rankings: {{ .Values.arenaRankings | sha256sum }}
    spec:
      serviceAccountName: {{ include "bchat.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.app.terminationGracePeriodSeconds }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "bchat.appConfigName" . }}
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            # Migrations are run by the pre-upgrade Helm hook Job, never by
            # app pods (otherwise every replica would race the Job on boot).
            - name: ENABLE_DB_MIGRATIONS
              value: "false"
          volumeMounts:
            - name: arena
              mountPath: /app/arena_rankings.json
              subPath: arena_rankings.json
              readOnly: true
            - name: litellm-config-shared
              mountPath: /app/litellm-config.yaml
              subPath: config.yaml
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
      volumes:
        - name: arena
          configMap:
            name: arena-rankings
        - name: litellm-config-shared
          configMap:
            name: litellm-config
