{{- if .Values.app.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
spec:
  # Quoted so numeric values ("1") and percentage strings ("50%") both
  # render as strings and pass K8s IntOrString validation.
  minAvailable: {{ .Values.app.pdb.minAvailable | quote }}
  selector:
    matchLabels:
      {{- include "bchat.appSelector" . | nindent 6 }}
{{- end }}
