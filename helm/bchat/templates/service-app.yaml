apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    {{- include "bchat.appSelector" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
