{{- if .Values.mcp.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ms365-mcp
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  minAvailable: {{ .Values.mcp.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "bchat.mcpSelector" . | nindent 6 }}
{{- end }}
