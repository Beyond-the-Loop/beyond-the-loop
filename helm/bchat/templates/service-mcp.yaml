apiVersion: v1
kind: Service
metadata:
  name: ms365-mcp
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    {{- include "bchat.mcpSelector" . | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
