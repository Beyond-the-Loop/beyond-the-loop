{{- if .Values.cronjobs.creditRechargeCheck.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: credit-recharge-check
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronjobs.creditRechargeCheck.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: curlimages/curl:8.10.1
              command:
                - sh
                - -c
                - |
                  curl -fsS -X POST \
                    -H "X-Internal-Trigger: ${INTERNAL_TRIGGER_SECRET}" \
                    "http://app.{{ .Release.Namespace }}.svc.cluster.local:8080/internal/cron/credit-recharge-check"
              env:
                - name: INTERNAL_TRIGGER_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "bchat.appConfigName" . }}
                      key: INTERNAL_TRIGGER_SECRET
{{- end }}
