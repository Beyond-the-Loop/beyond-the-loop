{{- if .Values.litellm.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: litellm
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  minAvailable: {{ .Values.litellm.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "bchat.litellmSelector" . | nindent 6 }}
{{- end }}
