{{- if .Values.litellm.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: litellm
  labels:
    {{- include "bchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: litellm
  minReplicas: {{ .Values.litellm.hpa.minReplicas }}
  maxReplicas: {{ .Values.litellm.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.litellm.hpa.targetCPU }}
  # Long scale-down stabilization keeps replicas around after CPU spikes so
  # transient traffic bursts do not immediately terminate pods that still
  # hold open streams. Streaming LLM responses (30–120s typical) cannot
  # survive default 5min stabilization plus abrupt SIGTERM cycles.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.litellm.hpa.scaleDownStabilizationSeconds }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
{{- end }}
