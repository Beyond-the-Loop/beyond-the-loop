  drop_params: true # Drop unsupported params from the request body
  reasoning_auto_summary: true
  default_fallbacks: ["Gemini 2.5 Flash"]

general_settings:
  alerting: ["slack"]
  alert_types: [
    "llm_exceptions",
    "llm_too_slow",
    "cooldown_deployment",
  ]

  # [OPTIONAL ALERTING ARGS]
  alerting_args:
      outage_alert_ttl: 60           # 1 minute in seconds
      region_outage_alert_ttl: 60    # 1 minute in seconds
      minor_outage_alert_threshold: 5
      major_outage_alert_threshold: 10
      max_outage_alert_list_size: 1000
      log_to_console: true
      log_request_body: true
