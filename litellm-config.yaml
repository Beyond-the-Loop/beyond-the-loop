router_settings:
  fallbacks:
    # Code-interpreter models fall back to other code-interpreter models first
    # to preserve the capability before degrading to a non-code-interpreter model.
    - {"GPT-5": ["GPT-5.4", "GPT-5.5"]}
    - {"GPT-5.4": ["GPT-5.5"]}
    - {"GPT-5.5": ["GPT-5.4"]}
    - {"GPT-5.4 Pro": ["GPT-5.5", "GPT-5.4"]}

    # Non-code-interpreter GPT models fall back to GPT-5 mini.
    - {"GPT o3": ["GPT-5 mini"]}
    - {"GPT o4-mini": ["GPT-5 mini"]}
    - {"GPT-5.1": ["GPT-5 mini"]}
    - {"GPT-5 nano": ["GPT-5 mini"]}
    - {"GPT OSS 120b": ["GPT-5 mini"]}
    - {"GPT-5.3 Codex": ["GPT-5 mini"]}
    - {"GPT-5.2": ["GPT-5 mini"]}

    # Claude models fall back within the family.
    - {"Claude Sonnet 4.5": ["Claude 4.5 Haiku"]}
    - {"Claude Sonnet 4.6": ["Claude 4.5 Haiku"]}
    - {"Claude Opus 4.6": ["Claude 4.5 Haiku"]}
    - {"Claude Opus 4.8": ["Claude 4.5 Haiku"]}

    # Global default backup: Gemini 2.5 Flash itself falls back to Claude 4.5 Haiku
    # (otherwise it has no fallback when it fails).
    - {"Gemini 2.5 Flash": ["Claude 4.5 Haiku"]}
    - {"Mistral Small 4": ["Gemini 2.5 Flash"]}

    - {"gpt-image-2": []}


litellm_settings:
  drop_params: true # Drop unsupported params from the request body
  reasoning_auto_summary: true
  default_fallbacks: ["Gemini 2.5 Flash"]

files_settings:
  - custom_llm_provider: azure
    api_base: os.environ/AZURE_OPENAI_ENDPOINT
    api_key: os.environ/AZURE_OPENAI_API_KEY
    api_version: "2025-04-01-preview"

general_settings:
  alerting: ["slack"]
  alert_types: [
    "llm_exceptions",
    "llm_too_slow",
    "cooldown_deployment",
  ]

  # [OPTIONAL ALERTING ARGS]
  alerting_args:
      outage_alert_ttl: 60           # 1 minute in seconds
      region_outage_alert_ttl: 60    # 1 minute in seconds
      minor_outage_alert_threshold: 5
      major_outage_alert_threshold: 10
      max_outage_alert_list_size: 1000
      log_to_console: true
      log_request_body: true
